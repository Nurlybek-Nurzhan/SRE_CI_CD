name: Advanced CI/CD to Kubernetes
on:
  push:
    branches: ["main"]
env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/advanced-demo-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/advanced-demo-frontend
jobs:
  build-and-push:
    name: Test, Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Test backend
        working-directory: backend
        run: |
          npm install
          npm test

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
      - name: Replace local image names with registry images
        run: |
          sed -i "s|sre-backend:v1|ghcr.io/${{ github.repository_owner }}/advanced-demo-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|sre-frontend:v1|ghcr.io/${{ github.repository_owner }}/advanced-demo-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          sed -i "s|imagePullPolicy: Never|imagePullPolicy: IfNotPresent|g" k8s/backend-deployment.yaml
          sed -i "s|imagePullPolicy: Never|imagePullPolicy: IfNotPresent|g" k8s/frontend-deployment.yaml
      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/backend
          kubectl rollout status deployment/frontend
